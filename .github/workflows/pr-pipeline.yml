name: Harness PR Pipeline

on: pull_request

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  pr-template:
    name: pr-template
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template completion
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const errors = [];

            if (body.trim().length === 0) {
              errors.push('PR body is empty. Fill out the full PR template.');
            }

            const requiredSections = [
              '## Summary',
              '## Checklist',
              '## Testing',
              '## Review artifacts',
              '## Notes',
            ];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push('Missing required section: ' + section);
              }
            }

            const checklistMatch = body.match(/## Checklist([\s\S]*?)(?:\n## |\n# |$)/i);
            if (!checklistMatch) {
              errors.push('Missing checklist block.');
            } else {
              const checklistBody = checklistMatch[1] ?? '';
              const checklistItems = checklistBody
                .split('\n')
                .map((line) => line.trim())
                .filter((line) => /^- \[[ xX]\]/.test(line));

              if (checklistItems.length === 0) {
                errors.push('Checklist has no checkbox items.');
              }

              const unchecked = checklistItems.filter((line) => /^- \[ \]/.test(line));
              if (unchecked.length > 0) {
                errors.push(
                  'Checklist has unchecked item(s):\n' + unchecked.join('\n'),
                );
              }
            }

            const placeholders = [
              'pass/fail',
              '<link / artifact path / comment ID>',
              'Add one-paragraph merge rationale here.',
            ];
            for (const placeholder of placeholders) {
              if (body.includes(placeholder)) {
                errors.push('Replace template placeholder: ' + placeholder);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }

  dependency-chain:
    name: dependency-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          mkdir -p "$RUNNER_TEMP/gitleaks-bin"
          tar -xzf /tmp/gitleaks.tar.gz -C "$RUNNER_TEMP/gitleaks-bin" gitleaks
          echo "$RUNNER_TEMP/gitleaks-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gitleaks-bin/gitleaks" version
      - run: uv sync
      - run: uv run pytest
