name: Harness PR Pipeline

on: pull_request

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  pr-template:
    name: pr-template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          mkdir -p "$RUNNER_TEMP/gitleaks-bin"
          tar -xzf /tmp/gitleaks.tar.gz -C "$RUNNER_TEMP/gitleaks-bin" gitleaks
          echo "$RUNNER_TEMP/gitleaks-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gitleaks-bin/gitleaks" version
      - run: uv sync
      - name: version-sync
        run: uv run python scripts/check_version_sync.py
      - run: uv run pytest
