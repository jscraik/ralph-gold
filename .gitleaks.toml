title = "Project gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allowlist for test fixtures and examples."
paths = [
  "(^|/)docs?/",
  "(^|/)\\.spec/",
  "(^|/)examples?/",
  "(^|/)test/",
  "(^|/)tests?/",
  "(^|/)spec/",
  "(^|/)__tests__/",
  "(^|/)test-data/",
  "(^|/)[^.]+\\.(test|spec)\\.[^.]+$",
]
regexes = [
  "\\[REDACTED\\]",
  "ghp_test[0-9A-Za-z]{20,}",
  "ghp_1234567890abcdefghijklmnop",
]

[[rules]]
id = "custom-aws-access-key-id"
description = "AWS access key ID"
regex = '''\bAKIA[0-9A-Z]{16}\b'''
keywords = ["AKIA"]

[[rules]]
id = "custom-private-key-header"
description = "Private key header"
regex = '''-----BEGIN (?:RSA|DSA|EC|OPENSSH|PGP|PRIVATE) PRIVATE KEY-----'''
keywords = ["PRIVATE KEY"]
